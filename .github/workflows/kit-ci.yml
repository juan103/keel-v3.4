name: kit-ci
on:
  push:
  pull_request:
  release:
    types: [published]
jobs:
  kit-tests:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install pytest
        run: python -m pip install pytest
      - name: Run kit self-tests
        run: python -m pytest tests/kit
